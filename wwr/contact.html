<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Warriors Rafting Company for general inquiries, trip reservation, and feedback. Find our location and contact information.">
    <meta name="author" content="Kenzoron Kavuma">
    <title>Contact Us | White Water Warriors Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <!-- Logo -->
        <img src="images/rafting-logo.jpg" alt="Rafting Logo" width="150">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>

        </nav>
    </header>

    <main>
        <section class="contact-info">

            <h1>White Water Warriors Rafting Company</h1>
            <p>Victoria Nile River</p>
            <p>Jinja, Eastern Region</p>
            <p>Phone: +256 753 643 720</p>
            <p>Email: info@whitewater.com</p>

        </section>

        <div class="contact-grid">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d397641.29027412273!2d32.6190844!3d0.418396!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x177c02b69307a5b7%3A0xd7a1ba52f7b72d0b!2sVictoria%20Nile%20River!5e1!3m2!1sen!2sug!4v1780752835624!5m2!1sen!2sug"
                  allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <section class="contact-form">
                <h6>Contact Us</h6>
                <form action="#" method="post">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Full name">


                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Email">

                    <p><strong>Message Purpose</strong></p>

                    <fieldset class="purpose-fieldset">
                        <div class="radio-buttons">
                            <label>
                                <input type="radio" id="general-inquiry" name="purpose"
                                  value="general-inquiry" checked>
                                General Inquiry
                            </label>
                            <label>
                                <input type="radio" id="reservation-question" name="purpose"
                                  value="reservation-question">
                                Reservation Question
                            </label>
                            <label>
                                <input type="radio" id="website-suggestion" name="purpose"
                                  value="website-suggestion">
                                Website Suggestion
                            </label>
                        </div>

                    </fieldset>

                    <div class="message-box">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Type here"
                          required></textarea>
                    </div>

                    <label class="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>

                </form>
            </section>
        </div>

        <!-- We are here to serve -->

        <section class="adventures">
            <h2>We Are Here to Serve You</h2>

            <div class="gallery">

                <figure>
                    <img src="images/director-of-operaction.jpg" alt="Thunder Rush">
                    <figcaption>Director of Operations</figcaption>
                </figure>

                <figure>
                    <img src="images/expedition-leader.jpg" alt="Group Race">
                    <figcaption>Expedition Leader</figcaption>
                </figure>

                <figure>
                    <img src="images/raft-guide.jpg" alt="Lively Adventure">
                    <figcaption>Raft Guide</figcaption>
                </figure>

            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 | White Water Warriors Rafting Company | Kenzoron Kavuma</p>

        <nav class="socialmedia">
            <a href="https://www.linkedin.com">
                <img src="images/linkedin-icon.png" alt="LinkedIn Icon" width="50">
            </a>
            <a href="https://www.facebook.com/">
                <img src="images/facebook-icon.png" alt="Facebook Icon" width="50">
            </a>
            <a href="https://www.tiktok.com/">
                <img src="images/tiktok-icon.png" alt="Tiktok Icon" width="50">
            </a>
        </nav>

    </footer>
</body>

</html>
